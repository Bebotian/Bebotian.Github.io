<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD Demon List</title>
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        /* The Main Container from your drawing */
        .level-card {
            background: #1e1e1e;
            border: 2px solid #333;
            border-radius: 15px; /* Rounded corners like your sketch */
            width: 600px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        /* Left Side: Rank, Name, Song */
        .info {
            text-align: left;
            flex: 1;
        }
        .rank { font-size: 2.5rem; font-weight: bold; margin: 0; color: #00ff73; }
        .name { font-size: 1.5rem; margin: 5px 0; font-weight: bold; }
        .song { font-size: 1rem; color: #aaa; margin: 0; }

        /* Middle: Image */
        .thumbnail {
            width: 150px;
            height: 90px;
            background: #333;
            border-radius: 10px;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 20px;
            overflow: hidden;
        }
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; }

        /* Right Side: View Button */
        .view-btn {
            background: none;
            border: 3px solid white;
            color: white;
            padding: 10px 25px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .view-btn:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

    <h1>DEMON LIST</h1>

    <!-- Level Card #1 -->
    <div class="level-card">
        <div class="info">
            <p class="rank">#1</p>
            <p class="name">Tidal Wave</p>
            <p class="song">Song: Shiawase</p>
        </div>
        
        <div class="thumbnail">
            <!-- Put an image link in src="" below -->
            <img src="https://via.placeholder.com" alt="Level Thumb">
        </div>

        <a href="level1.html" class="view-btn">View</a>
    </div>

    <!-- Level Card #2 -->
    <div class="level-card">
        <div class="info">
            <p class="rank">#2</p>
            <p class="name">Avernus</p>
            <p class="song">Song: Granite</p>
        </div>
        
        <div class="thumbnail">
            <img src="https://via.placeholder.com" alt="Level Thumb">
        </div>

        <a href="level2.html" class="view-btn">View</a>
    </div>

</body>
</html>
