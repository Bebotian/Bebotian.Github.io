<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD Demon List</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; min-height: 100vh; }

        /* TOP NAV */
        .topbar { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: #181818; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 100; }
        .topbar-left { display: flex; align-items: center; gap: 24px; }
        .topbar-title { color: #00ff73; font-weight: bold; font-size: 1.1rem; letter-spacing: 2px; text-decoration: none; }
        .topbar-title-divider { width: 1px; height: 20px; background: #333; flex-shrink: 0; }
        .topbar-right { display: flex; align-items: center; gap: 8px; }

        /* NAV LINKS */
        .nav-link { color: #aaa; text-decoration: none; font-size: 0.85rem; font-weight: bold; padding: 6px 12px; border-radius: 6px; transition: color 0.2s, background 0.2s; }
        .nav-link:hover { color: white; background: #2a2a2a; }
        .nav-link.active { color: #00ff73; }
        .nav-btn { background: #00ff73; color: #000; text-decoration: none; font-size: 0.85rem; font-weight: bold; padding: 7px 14px; border-radius: 6px; transition: opacity 0.2s; border: none; cursor: pointer; }
        .nav-btn:hover { opacity: 0.85; }
        .nav-divider { width: 1px; height: 20px; background: #2a2a2a; margin: 0 4px; }

        /* AUTH LINKS (logged out) */
        #auth-links { display: flex; align-items: center; gap: 8px; }
        #auth-links a { color: #00ff73; text-decoration: none; font-weight: bold; font-size: 0.85rem; padding: 6px 12px; border: 1.5px solid #00ff73; border-radius: 6px; transition: background 0.2s, color 0.2s; }
        #auth-links a:hover { background: #00ff73; color: #000; }

        /* USER BUTTON */
        #user-menu-wrapper { position: relative; display: none; }
        #user-btn { background: #1e1e1e; border: 1.5px solid #333; color: white; padding: 7px 14px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; transition: border-color 0.2s; }
        #user-btn:hover { border-color: #00ff73; }
        .avatar { width: 26px; height: 26px; border-radius: 50%; background: #00ff73; color: #000; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; flex-shrink: 0; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chevron { font-size: 0.65rem; color: #888; transition: transform 0.2s; }
        #user-btn.open .chevron { transform: rotate(180deg); }
        #user-dropdown { display: none; position: absolute; top: calc(100% + 8px); right: 0; background: #1e1e1e; border: 1.5px solid #333; border-radius: 10px; min-width: 190px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        #user-dropdown.open { display: block; animation: dropIn 0.15s ease; }
        @keyframes dropIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-header { padding: 12px 16px; border-bottom: 1px solid #2a2a2a; font-size: 0.75rem; color: #888; }
        .dropdown-header span { display: block; color: white; font-weight: bold; font-size: 0.9rem; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; cursor: pointer; font-size: 0.88rem; color: #ccc; transition: background 0.15s, color 0.15s; text-decoration: none; }
        .dropdown-item:hover { background: #2a2a2a; color: white; }
        .dropdown-item .icon { font-size: 1rem; width: 18px; text-align: center; }
        .dropdown-divider { height: 1px; background: #2a2a2a; }
        .dropdown-item.danger { color: #ff5555; }
        .dropdown-item.danger:hover { background: #2a1a1a; color: #ff6666; }

        /* PAGE CONTENT */
        .page-content { margin-top: 80px; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 700px; margin-left: auto; margin-right: auto; padding: 20px 16px 60px; }
        .level-card { background: #1e1e1e; border: 2px solid #333; border-radius: 15px; width: 600px; padding: 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 16px; }
        .rank { font-size: 2.5rem; font-weight: bold; color: #00ff73; margin: 0; flex-shrink: 0; }
        .info { flex: 1; margin-left: 8px; }
        .info .level-name { font-size: 1.05rem; font-weight: bold; margin: 0 0 4px; }
        .info .level-creator { font-size: 0.85rem; color: #aaa; margin: 0 0 2px; }
        .info .level-song { font-size: 0.8rem; color: #888; margin: 0 0 2px; }
        .info .level-verifier { font-size: 0.8rem; color: #888; margin: 0; }
        .info .level-song span, .info .level-verifier span { color: #ccc; }
        .thumbnail { width: 200px; height: 113px; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .view-btn { border: 2px solid white; color: white; padding: 10px 20px; text-decoration: none; border-radius: 8px; font-weight: bold; white-space: nowrap; flex-shrink: 0; }
        input { background: #111; border: 1px solid #444; color: white; padding: 10px; margin: 5px; width: 80%; border-radius: 5px; }

        
                /* ── HAMBURGER (hidden on desktop) ── */
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px 4px; background: none; border: none; flex-shrink: 0; }
        .hamburger span { width: 22px; height: 2px; background: #aaa; border-radius: 2px; transition: all 0.25s; display: block; }
        .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); background: #00ff73; }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); background: #00ff73; }

        /* ── MOBILE NAV DRAWER (hidden on desktop) ── */
        .mobile-nav { display: none; position: fixed; top: 56px; left: 0; right: 0; background: #181818; border-bottom: 2px solid #2a2a2a; z-index: 98; flex-direction: column; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .mobile-nav.open { display: flex; }
        .mobile-nav a { color: #aaa; text-decoration: none; font-size: 0.95rem; font-weight: bold; padding: 15px 24px; border-bottom: 1px solid #1e1e1e; transition: color 0.15s, background 0.15s; }
        .mobile-nav a.nav-active { color: #00ff73; }
        .mobile-nav a:active { background: #222; }
        .mobile-nav .m-submit { background: #00ff73; color: #000; margin: 12px 16px; border-radius: 8px; text-align: center; padding: 13px; border-bottom: none; font-size: 0.95rem; }

        /* ── MOBILE ONLY (phones/tablets under 768px) ── */
        @media (max-width: 768px) {
            /* Topbar: hide desktop nav, show hamburger */
            .topbar-left .nav-link,
            .topbar-left .topbar-title-divider,
            .topbar-left .topbar-title ~ .topbar-title,
            .nav-btn, .nav-divider { display: none !important; }
            .hamburger { display: flex !important; }
            .topbar-title { font-size: 0.9rem !important; letter-spacing: 1px !important; }
            .topbar { padding: 0 14px !important; }

            /* Body & page layout */
            .page-content { margin-top: 70px !important; padding: 12px 12px 60px !important; }

            /* Level cards: stack vertically */
            .level-card { width: 100% !important; flex-direction: column !important; align-items: flex-start !important; padding: 14px !important; gap: 10px !important; border-radius: 10px !important; }
            .thumbnail { width: 100% !important; height: 190px !important; margin: 0 !important; border-radius: 8px !important; }
            .rank { font-size: 2rem !important; }
            .view-btn { display: block !important; text-align: center !important; width: 100% !important; }
            .info { margin-left: 0 !important; width: 100% !important; }

            /* Stats: 2 col grid */
            .summary-row { grid-template-columns: repeat(2, 1fr) !important; }

            /* Settings rows: stack label + input */
            .settings-row { flex-direction: column !important; align-items: flex-start !important; gap: 8px !important; }
            .settings-input { width: 100% !important; max-width: 100% !important; }
            .avatar-row { flex-direction: column !important; }
            .avatar-upload-label { width: 100% !important; justify-content: center !important; }

            /* Record cards */
            .record-card { flex-direction: column !important; align-items: flex-start !important; gap: 10px !important; }
            .record-actions { width: 100% !important; justify-content: space-between !important; }

            /* Forms */
            .form-row input { font-size: 0.95rem !important; }
            .page-content > h1 { font-size: 1.3rem !important; margin-bottom: 4px !important; }

            /* Admin claim cards */
            .claim-card-top { flex-direction: column !important; }
            .claim-actions { margin-top: 8px !important; flex-wrap: wrap !important; }

            /* Auth pages */
            .auth-container { width: 94vw !important; padding: 28px 18px !important; }

            /* Max width fix */
            .card, .settings-section, .form-card, .about-card { border-radius: 8px !important; }
        }
    </style>
</head>
<body>

        
    <div class="topbar">
        <div class="topbar-left">
            <a class="topbar-title active-title" href="index.html">⚔ DEMON LIST</a>
            <div class="topbar-title-divider"></div>
            <a class="topbar-title" href="bebotian.html">⚔ BEBOTIAN DEMON LIST</a>
            <a class="nav-link" href="stats.html">📊 Stats</a>
            <a class="nav-link" href="rules.html">📋 Rules</a>
            <a class="nav-link" href="about.html">ℹ️ About</a>
        </div>
        <div class="topbar-right">
            <a class="nav-btn" href="submit.html">+ Submit Record</a>
            <div class="nav-divider"></div>
            <div id="auth-links">
                <a href="signup.html">Sign Up</a>
                <a href="login.html">Login</a>
            </div>
            <div id="user-menu-wrapper">
                <button id="user-btn" onclick="toggleDropdown()">
                    <div class="avatar" id="user-avatar"><span id="user-avatar-letter">?</span></div>
                    <span id="user-label">Loading...</span>
                    <span class="chevron">▼</span>
                </button>
                <div id="user-dropdown">
                    <div class="dropdown-header">Signed in as<span id="dropdown-email"></span></div>
                    <a class="dropdown-item" href="my-records.html"><span class="icon">🏆</span> My Records</a>
                    <a class="dropdown-item" href="settings.html"><span class="icon">⚙️</span> User Settings</a>
                    <a class="dropdown-item" href="admin.html" id="admin-link" style="display:none;"><span class="icon">🛡️</span> Admin Panel</a>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item danger" onclick="logOut()"><span class="icon">🚪</span> Log Out</div>
                </div>
            </div>
        </div>

    <!-- Mobile nav drawer -->
    <div class="mobile-nav" id="mobile-nav">
        <a href="index.html" class="nav-active">⚔ Demon List</a>
        <a href="bebotian.html">⚔ Bebotian Demon List</a>
        <a href="stats.html">📊 Stats</a>
        <a href="rules.html">📋 Rules</a>
        <a href="about.html">ℹ️ About</a>
        <a href="submit.html" class="m-submit">+ Submit Record</a>
    </div>

    <div class="page-content">
        <h1>DEMON LIST</h1>
        <div id="list-container">
            <p id="status-msg">Connecting to database...</p>
        </div>
    </div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  const sb = createClient(
    'https://outwfzgqwklazecpmmfl.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91dHdmemdxd2tsYXplY3BtbWZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTc2NjMsImV4cCI6MjA4OTA5MzY2M30.HYk1XXikmm3Dx0tWk0rACS_fSe5dQRf0KY_PuMzdiDA'
  );

  window.logOut = async () => { await sb.auth.signOut(); window.location.reload(); };
  window.toggleDropdown = () => {
    document.getElementById('user-btn').classList.toggle('open');
    document.getElementById('user-dropdown').classList.toggle('open');
  };
  document.addEventListener('click', (e) => {
    const w = document.getElementById('user-menu-wrapper');
    if (w && !w.contains(e.target)) {
      document.getElementById('user-btn').classList.remove('open');
      document.getElementById('user-dropdown').classList.remove('open');
    }
  });

  async function loadLevels() {
    try {
      const { data: levels, error } = await sb.from('levels').select('*').order('rank', { ascending: true });
      if (error) throw error;
      const container = document.getElementById('list-container');
      if (!levels || levels.length === 0) { container.innerHTML = '<p>No levels found.</p>'; return; }
      container.innerHTML = '';
      levels.forEach(level => {
        let thumb = 'https://via.placeholder.com/200x113';
        if (level.video_url && level.video_url.includes('v=')) {
          const videoId = level.video_url.split('v=')[1].split('&')[0];
          thumb = `https://img.youtube.com/vi/${videoId}/0.jpg`;
        }
        container.innerHTML += `
          <div class="level-card">
            <p class="rank">#${level.rank}</p>
            <div class="info">
              <p class="level-name">${level.name}</p>
              <p class="level-creator">by ${level.creator || 'Unknown'}</p>
              <p class="level-song">🎵 <span>${level.Song || 'Unknown'}</span></p>
              <p class="level-verifier">✅ Verified by <span>${level.Verifier || 'Unknown'}</span></p>
            </div>
            <div class="thumbnail"><img src="${thumb}" alt="thumbnail"></div>
            <a href="${level.video_url || '#'}" target="_blank" class="view-btn">View</a>
          </div>`;
      });
    } catch (err) {
      document.getElementById('status-msg').innerText = "Database Error: " + err.message;
    }
  }

  async function checkAuth() {
    const { data: { user } } = await sb.auth.getUser();
    if (user) {
      const username = user.user_metadata?.username || user.email.split('@')[0];
      document.getElementById('auth-links').style.display = 'none';
      document.getElementById('user-menu-wrapper').style.display = 'block';
      document.getElementById('user-label').innerText = username;
      document.getElementById('user-avatar-letter').innerText = username[0].toUpperCase();
            const avatarUrl = user.user_metadata?.avatar_url || null;
            if (avatarUrl) {
                document.getElementById('user-avatar').innerHTML = `<img src="${avatarUrl}" alt="avatar">`;
            }
      document.getElementById('dropdown-email').innerText = user.email;
            // Check admin status from profiles
            const { data: _profile } = await sb.from('profiles').select('is_admin, username, avatar_url').eq('id', user.id).maybeSingle();
            if (_profile?.is_admin) { const al = document.getElementById('admin-link'); if (al) al.style.display = 'flex'; }
            if (_profile?.username) document.getElementById('user-label').innerText = _profile.username;
            if (_profile?.avatar_url) document.getElementById('user-avatar').innerHTML = `<img src="${_profile.avatar_url}" alt="avatar">`;
    }
  }

  loadLevels();
  checkAuth();

        function toggleMobileNav() {
            const nav = document.getElementById('mobile-nav');
            const btn = document.getElementById('hamburger-btn');
            if (!nav || !btn) return;
            nav.classList.toggle('open');
            btn.classList.toggle('open');
        }
        // Close mobile nav when clicking outside
        document.addEventListener('click', (e) => {
            const nav = document.getElementById('mobile-nav');
            const btn = document.getElementById('hamburger-btn');
            if (nav && btn && !nav.contains(e.target) && !btn.contains(e.target)) {
                nav.classList.remove('open');
                btn.classList.remove('open');
            }
        });
    
        // ── Mobile nav toggle ──
        window.toggleMobileNav = function() {
            document.getElementById('mobile-nav').classList.toggle('open');
            document.getElementById('hamburger-btn').classList.toggle('open');
        };
        document.addEventListener('click', function(e) {
            var nav = document.getElementById('mobile-nav');
            var btn = document.getElementById('hamburger-btn');
            if (!nav || !btn) return;
            if (nav.classList.contains('open') && !nav.contains(e.target) && !btn.contains(e.target)) {
                nav.classList.remove('open');
                btn.classList.remove('open');
            }
        });
    </script>
</body>
</html>
