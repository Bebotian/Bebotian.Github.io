<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GD Demon List</title>
    <style>
        /* Pointercrate-style Dark Theme */
        body { background-color: #1c1c1c; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding-top: 50px; }
        .container { width: 85%; max-width: 900px; margin: auto; }
        
        /* Header */
        h1 { text-align: center; font-size: 3rem; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        .subtitle { text-align: center; color: #00ff73; font-weight: bold; margin-bottom: 40px; }

        /* Level Cards */
        .level-card { 
            background: #252525; border-left: 5px solid #00ff73; 
            margin-bottom: 15px; padding: 20px; display: flex; 
            justify-content: space-between; align-items: center;
            border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .rank { font-size: 1.5rem; font-weight: 900; color: #00ff73; min-width: 50px; }
        .details { flex-grow: 1; margin-left: 20px; }
        .level-name { font-size: 1.2rem; font-weight: bold; color: #fff; }
        .creator { color: #aaa; font-size: 0.9rem; }
        
        /* Buttons/Links */
        .video-link { 
            background: #00ff73; color: #000; padding: 8px 15px; 
            text-decoration: none; border-radius: 3px; font-weight: bold; font-size: 0.8rem;
        }
        .video-link:hover { background: #00cc5c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Bebotian Demon List</h1>
        <p class="subtitle">Ranking the Hardest Levels</p>

        <!-- Repeat this block for each level -->
        <div class="level-card">
            <div class="rank">#1</div>
            <div class="details">
                <div class="level-name">Tidal Wave</div>
                <div class="creator">by OniLink</div>
            </div>
            <a href="#" class="video-link">WATCH VIDEO</a>
        </div>

        <div class="level-card">
            <div class="rank">#2</div>
            <div class="details">
                <div class="level-name">Avernus</div>
                <div class="creator">by Panyzn</div>
            </div>
            <a href="#" class="video-link">WATCH VIDEO</a>
        </div>
    </div>
</body>
</html>
