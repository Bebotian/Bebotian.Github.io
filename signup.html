<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Demon List</title>
    
    <!-- Use cdnjs - Often the most compatible link -->
    <script src="https://cdnjs.cloudflare.com"></script>

    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 100px; }
        .auth-container { background: #1e1e1e; padding: 40px; border-radius: 15px; border: 2px solid #333; width: 350px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { background: #111; border: 1px solid #444; color: white; padding: 12px; margin: 10px 0; width: 90%; border-radius: 5px; }
        button { background: #00ff73; color: black; border: none; padding: 12px; width: 98%; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        #msg { color: #00ff73; font-size: 0.8rem; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Create Account</h2>
        <form id="signup-form">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password (min 6 chars)" required>
            <button type="submit">Sign Up</button>
        </form>
        <p id="msg">Initializing Database...</p>
        <a href="index.html" style="color:#aaa; text-decoration:none; display:block; margin-top:15px; font-size:0.8rem;">← Back</a>
    </div>

    <script>
        let sb;

        // Try to connect every 200ms until the library is ready
        const init = setInterval(() => {
            if (window.supabase) {
                sb = window.supabase.createClient(
                    'https://outwfzgqwklazecpmmfl.supabase.co', 
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91dHdmemdxd2tsYXplY3BtbWZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTc2NjMsImV4cCI6MjA4OTA5MzY2M30.HYk1XXikmm3Dx0tWk0rACS_fSe5dQRf0KY_PuMzdiDA'
                );
                document.getElementById('msg').innerText = "✓ Database Ready";
                document.getElementById('msg').style.color = "#00ff73";
                clearInterval(init); // Stop searching once found
            }
        }, 200);

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!sb) return alert("Still connecting... Please wait a moment.");

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            document.getElementById('msg').innerText = "Creating account...";

            const { data, error } = await sb.auth.signUp({ email, password });

            if (error) {
                alert(error.message);
                document.getElementById('msg').innerText = "Signup Failed.";
            } else {
                alert("Success! You can now log in.");
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
