  // This function runs when the user clicks your "Sign Up" button
  async function handleSignUp(event) {
    event.preventDefault(); // Prevents the page from refreshing

    // Get the values from your HTML input boxes
    // Make sure your <input> tags have these exact IDs: id="email" and id="password"
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const { data, error } = await supabase.auth.signUp({
      email: email,
      password: password,
    });

    if (error) {
      alert('Error: ' + error.message);
      console.error(error);
    } else {
      alert('Success! Check your email to confirm your account.');
      // Optional: Redirect them to home page after success
      window.location.href = "index.html";
    }
  }

  // Tell the form to use the function above when submitted
  // This assumes your <form> tag has id="signup-form"
  const signupForm = document.getElementById('signup-form');
  if (signupForm) {
    signupForm.addEventListener('submit', handleSignUp);
  }
</script>
