<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Demon List</title>

    <!-- FIX #3: Correct cdnjs URL with full path to the supabase JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 100px; }
        .auth-container { background: #1e1e1e; padding: 40px; border-radius: 15px; border: 2px solid #333; width: 350px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { background: #111; border: 1px solid #444; color: white; padding: 12px; margin: 10px 0; width: 90%; border-radius: 5px; }
        button { background: #00ff73; color: black; border: none; padding: 12px; width: 98%; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        #msg { color: #00ff73; font-size: 0.8rem; margin-top: 15px; font-weight: bold; }
        .links { margin-top: 15px; font-size: 0.8rem; }
        .links a { color: #aaa; text-decoration: none; display: block; margin-top: 8px; }
        .links a:hover { color: #00ff73; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Create Account</h2>
        <form id="signup-form">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password (min 6 chars)" required>
            <button type="submit">Sign Up</button>
        </form>
        <p id="msg">Initializing Database...</p>
        <div class="links">
            <a href="login.html">Already have an account? Log in</a>
            <a href="index.html">← Back to Demon List</a>
        </div>
    </div>

    <script>
        // FIX #4: supabase is now loaded synchronously via the script tag above,
        // no polling interval needed — just init directly.
        const sb = supabase.createClient(
            'https://outwfzgqwklazecpmmfl.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91dHdmemdxd2tsYXplY3BtbWZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTc2NjMsImV4cCI6MjA4OTA5MzY2M30.HYk1XXikmm3Dx0tWk0rACS_fSe5dQRf0KY_PuMzdiDA'
        );

        document.getElementById('msg').innerText = "✓ Database Ready";

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            document.getElementById('msg').innerText = "Creating account...";

            const { data, error } = await sb.auth.signUp({ email, password });
            if (error) {
                alert(error.message);
                document.getElementById('msg').innerText = "Signup Failed.";
            } else {
                alert("Success! Check your email to confirm, then log in.");
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
