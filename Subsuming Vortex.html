<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... - Demon List</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; min-height: 100vh; }

        /* TOPBAR */
        .topbar { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: #181818; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 100; }
        .topbar-left { display: flex; align-items: center; gap: 24px; }
        .topbar-title { color: #00ff73; font-weight: bold; font-size: 1.1rem; letter-spacing: 2px; text-decoration: none; }
        .topbar-title-divider { width: 1px; height: 20px; background: #333; flex-shrink: 0; }
        .topbar-right { display: flex; align-items: center; gap: 8px; }
        .nav-link { color: #aaa; text-decoration: none; font-size: 0.85rem; font-weight: bold; padding: 6px 12px; border-radius: 6px; transition: color 0.2s, background 0.2s; }
        .nav-link:hover { color: white; background: #2a2a2a; }
        .nav-btn { background: #00ff73; color: #000; text-decoration: none; font-size: 0.85rem; font-weight: bold; padding: 7px 14px; border-radius: 6px; transition: opacity 0.2s; }
        .nav-btn:hover { opacity: 0.85; }
        .nav-divider { width: 1px; height: 20px; background: #2a2a2a; margin: 0 4px; }
        #auth-links { display: flex; align-items: center; gap: 8px; }
        #auth-links a { color: #00ff73; text-decoration: none; font-weight: bold; font-size: 0.85rem; padding: 6px 12px; border: 1.5px solid #00ff73; border-radius: 6px; transition: background 0.2s, color 0.2s; }
        #auth-links a:hover { background: #00ff73; color: #000; }
        #user-menu-wrapper { position: relative; display: none; }
        #user-btn { background: #1e1e1e; border: 1.5px solid #333; color: white; padding: 7px 14px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; transition: border-color 0.2s; }
        #user-btn:hover { border-color: #00ff73; }
        .avatar { width: 26px; height: 26px; border-radius: 50%; background: #00ff73; color: #000; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; flex-shrink: 0; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chevron { font-size: 0.65rem; color: #888; transition: transform 0.2s; }
        #user-btn.open .chevron { transform: rotate(180deg); }
        #user-dropdown { display: none; position: absolute; top: calc(100% + 8px); right: 0; background: #1e1e1e; border: 1.5px solid #333; border-radius: 10px; min-width: 190px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        #user-dropdown.open { display: block; animation: dropIn 0.15s ease; }
        @keyframes dropIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-header { padding: 12px 16px; border-bottom: 1px solid #2a2a2a; font-size: 0.75rem; color: #888; }
        .dropdown-header span { display: block; color: white; font-weight: bold; font-size: 0.9rem; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; cursor: pointer; font-size: 0.88rem; color: #ccc; transition: background 0.15s, color 0.15s; text-decoration: none; }
        .dropdown-item:hover { background: #2a2a2a; color: white; }
        .dropdown-item .icon { font-size: 1rem; width: 18px; text-align: center; }
        .dropdown-divider { height: 1px; background: #2a2a2a; }
        .dropdown-item.danger { color: #ff5555; }
        .dropdown-item.danger:hover { background: #2a1a1a; color: #ff6666; }
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px 4px; background: none; border: none; flex-shrink: 0; }
        .hamburger span { width: 22px; height: 2px; background: #aaa; border-radius: 2px; transition: all 0.25s; display: block; }
        .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); background: #00ff73; }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); background: #00ff73; }
        .mobile-nav { display: none; position: fixed; top: 56px; left: 0; right: 0; background: #181818; border-bottom: 2px solid #2a2a2a; z-index: 98; flex-direction: column; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .mobile-nav.open { display: flex; }
        .mobile-nav a { color: #aaa; text-decoration: none; font-size: 0.95rem; font-weight: bold; padding: 15px 24px; border-bottom: 1px solid #1e1e1e; display: block; }
        .mobile-nav a.nav-active { color: #00ff73; }
        .mobile-nav .m-submit { background: #00ff73; color: #000; margin: 12px 16px; border-radius: 8px; text-align: center; padding: 13px; border-bottom: none; }
        @media (max-width: 768px) {
            .topbar-left .nav-link, .topbar-left .topbar-title-divider, .topbar-left .topbar-title ~ .topbar-title, .nav-btn, .nav-divider { display: none !important; }
            .hamburger { display: flex !important; }
            .topbar { padding: 0 14px !important; }
            .topbar-title { font-size: 0.9rem !important; letter-spacing: 1px !important; }
        }

        /* PAGE */
        .page-content { margin-top: 80px; max-width: 860px; margin-left: auto; margin-right: auto; padding: 30px 20px 60px; }

        /* HERO BANNER */
        .hero { position: relative; width: 100%; height: 320px; border-radius: 16px; overflow: hidden; margin-bottom: 28px; background: #1a1a1a; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 60%, transparent 100%); }
        .hero-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px 28px; }
        .hero-rank { font-size: 0.85rem; color: #00ff73; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
        .hero-name { font-size: 2.4rem; font-weight: bold; margin: 0 0 4px; line-height: 1.1; }
        .hero-creator { font-size: 1rem; color: #aaa; margin: 0; }

        /* INFO GRID */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .info-card { background: #1e1e1e; border: 1.5px solid #2a2a2a; border-radius: 12px; padding: 18px 20px; }
        .info-card .label { font-size: 0.72rem; font-weight: bold; color: #555; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
        .info-card .value { font-size: 1rem; color: #ccc; }
        .info-card .value a { color: #00ff73; text-decoration: none; }
        .info-card .value a:hover { text-decoration: underline; }

        /* ACTION BUTTONS */
        .action-row { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
        .btn-watch { background: #00ff73; color: #000; text-decoration: none; padding: 12px 28px; border-radius: 8px; font-weight: bold; font-size: 0.95rem; transition: opacity 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-watch:hover { opacity: 0.85; }
        .btn-submit { background: transparent; color: #00ff73; border: 2px solid #00ff73; text-decoration: none; padding: 12px 28px; border-radius: 8px; font-weight: bold; font-size: 0.95rem; transition: background 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-submit:hover { background: #00ff7322; }
        .btn-back { background: transparent; color: #888; border: 1.5px solid #333; text-decoration: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; transition: border-color 0.2s, color 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-back:hover { border-color: #888; color: white; }

        /* RECORDS TABLE */
        .section-title { font-size: 1rem; font-weight: bold; color: #ccc; margin-bottom: 14px; }
        .records-card { background: #1e1e1e; border: 1.5px solid #2a2a2a; border-radius: 12px; overflow: hidden; }
        .records-table { width: 100%; border-collapse: collapse; }
        .records-table th { text-align: left; padding: 12px 16px; font-size: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2a2a2a; }
        .records-table td { padding: 12px 16px; font-size: 0.9rem; border-bottom: 1px solid #1a1a1a; }
        .records-table tr:last-child td { border-bottom: none; }
        .records-table tr:hover td { background: #222; }
        .records-table .player-name { font-weight: bold; color: white; }
        .records-table a { color: #00ff73; text-decoration: none; font-size: 0.82rem; }
        .records-table a:hover { text-decoration: underline; }

        /* NOT FOUND */
        .not-found { text-align: center; padding: 80px 20px; color: #555; }
        .not-found .big { font-size: 3rem; margin-bottom: 16px; }
        .not-found h2 { color: #888; font-size: 1.4rem; margin-bottom: 8px; }
        .not-found p { font-size: 0.9rem; margin-bottom: 24px; }
        .not-found a { color: #00ff73; text-decoration: none; padding: 10px 24px; border: 1.5px solid #00ff73; border-radius: 8px; }

        /* LOADING */
        .loading { text-align: center; padding: 80px 20px; color: #555; }
        .loading .spinner { width: 36px; height: 36px; border: 3px solid #2a2a2a; border-top-color: #00ff73; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .hero { height: 220px; }
            .hero-name { font-size: 1.6rem; }
            .info-grid { grid-template-columns: 1fr; }
            .action-row { flex-direction: column; }
            .btn-watch, .btn-submit, .btn-back { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="topbar-left">
            <a class="topbar-title" href="../index.html">⚔ DEMON LIST</a>
            <div class="topbar-title-divider"></div>
            <a class="topbar-title" href="../bebotian.html">⚔ BEBOTIAN DEMON LIST</a>
            <a class="nav-link" href="../stats.html">📊 Stats</a>
            <a class="nav-link" href="../rules.html">📋 Rules</a>
            <a class="nav-link" href="../about.html">ℹ️ About</a>
        </div>
        <div class="topbar-right">
            <a class="nav-btn" href="../submit.html">+ Submit Record</a>
            <div class="nav-divider"></div>
            <button class="hamburger" id="hamburger-btn" onclick="toggleMobileNav()"><span></span><span></span><span></span></button>
            <div id="auth-links">
                <a href="../signup.html">Sign Up</a>
                <a href="../login.html">Login</a>
            </div>
            <div id="user-menu-wrapper">
                <button id="user-btn" onclick="toggleDropdown()">
                    <div class="avatar" id="user-avatar"><span id="user-avatar-letter">?</span></div>
                    <span id="user-label">Loading...</span>
                    <span class="chevron">▼</span>
                </button>
                <div id="user-dropdown">
                    <div class="dropdown-header">Signed in as<span id="dropdown-email"></span></div>
                    <a class="dropdown-item" href="../my-records.html"><span class="icon">🏆</span> My Records</a>
                    <a class="dropdown-item" href="../settings.html"><span class="icon">⚙️</span> User Settings</a>
                    <a class="dropdown-item" href="../admin.html" id="admin-link" style="display:none;"><span class="icon">🛡️</span> Admin Panel</a>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item danger" onclick="logOut()"><span class="icon">🚪</span> Log Out</div>
                </div>
            </div>
        </div>
    </div>

    <div class="mobile-nav" id="mobile-nav">
        <a href="../index.html">⚔ Demon List</a>
        <a href="../bebotian.html">⚔ Bebotian Demon List</a>
        <a href="../stats.html">📊 Stats</a>
        <a href="../rules.html">📋 Rules</a>
        <a href="../about.html">ℹ️ About</a>
        <a href="../submit.html" class="m-submit">+ Submit Record</a>
    </div>

    <div class="page-content" id="page-content">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading level...</p>
        </div>
    </div>

    <script>
        const sb = supabase.createClient(
            'https://outwfzgqwklazecpmmfl.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91dHdmemdxd2tsYXplY3BtbWZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTc2NjMsImV4cCI6MjA4OTA5MzY2M30.HYk1XXikmm3Dx0tWk0rACS_fSe5dQRf0KY_PuMzdiDA'
        );

        function toggleDropdown() {
            document.getElementById('user-btn').classList.toggle('open');
            document.getElementById('user-dropdown').classList.toggle('open');
        }
        function toggleMobileNav() {
            document.getElementById('mobile-nav').classList.toggle('open');
            document.getElementById('hamburger-btn').classList.toggle('open');
        }
        document.addEventListener('click', (e) => {
            const w = document.getElementById('user-menu-wrapper');
            if (w && !w.contains(e.target)) {
                document.getElementById('user-btn').classList.remove('open');
                document.getElementById('user-dropdown').classList.remove('open');
            }
            const nav = document.getElementById('mobile-nav');
            const btn = document.getElementById('hamburger-btn');
            if (nav && btn && nav.classList.contains('open') && !nav.contains(e.target) && !btn.contains(e.target)) {
                nav.classList.remove('open');
                btn.classList.remove('open');
            }
        });
        async function logOut() { await sb.auth.signOut(); window.location.href = '../index.html'; }
        async function initAuth() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) return null;
            document.getElementById('auth-links').style.display = 'none';
            document.getElementById('user-menu-wrapper').style.display = 'block';
            document.getElementById('dropdown-email').innerText = user.email;
            const { data: profile } = await sb.from('profiles').select('is_admin, username, avatar_url').eq('id', user.id).maybeSingle();
            const username = profile?.username || user.user_metadata?.username || user.email.split('@')[0];
            document.getElementById('user-label').innerText = username;
            if (profile?.avatar_url) {
                document.getElementById('user-avatar').innerHTML = `<img src="${profile.avatar_url}" alt="avatar">`;
            } else {
                document.getElementById('user-avatar-letter').innerText = username[0].toUpperCase();
            }
            if (profile?.is_admin) { const al = document.getElementById('admin-link'); if (al) al.style.display = 'flex'; }
            return { user, profile };
        }

        // ── LEVEL PAGE LOGIC ──
        // Get level name from the filename (e.g. "Every End.html" → "Every End")
        function getLevelNameFromFilename() {
            const path = window.location.pathname;
            const filename = path.split('/').pop(); // e.g. "Every End.html"
            const name = decodeURIComponent(filename.replace(/\.html$/i, ''));
            return name;
        }

        function getYouTubeId(url) {
            if (!url) return null;
            const m = url.match(/(?:v=|youtu\.be\/)([^&?/]+)/);
            return m ? m[1] : null;
        }

        async function loadLevel() {
            const levelName = getLevelNameFromFilename();
            const container = document.getElementById('page-content');

            // Search in both tables
            const [{ data: mainLevels }, { data: beboLevels }] = await Promise.all([
                sb.from('levels').select('*').ilike('name', levelName).limit(1),
                sb.from('BebotianLevels').select('*').ilike('name', levelName).limit(1),
            ]);

            const level = mainLevels?.[0] || beboLevels?.[0] || null;
            const isMain = !!mainLevels?.[0];

            if (!level) {
                document.title = `${levelName} - Not Found`;
                container.innerHTML = `
                    <div class="not-found">
                        <div class="big">😔</div>
                        <h2>"${levelName}" not found</h2>
                        <p>This level doesn't exist on the list, or the filename doesn't match exactly.</p>
                        <a href="../index.html">← Back to List</a>
                    </div>`;
                return;
            }

            document.title = `${level.name} - Demon List`;

            const videoId = getYouTubeId(level.video_url);
            const thumb = videoId
                ? `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`
                : 'https://via.placeholder.com/860x320/1a1a1a/333?text=No+Thumbnail';

            // Fetch approved records for this level
            const { data: records } = await sb.from('Records')
                .select('*')
                .eq('level_name', level.name)
                .eq('status', 'approved')
                .order('created_at', { ascending: true });

            // Fetch player names from claims/profiles
            const userIds = [...new Set((records || []).map(r => r.user_id))];
            let nameMap = {};
            if (userIds.length > 0) {
                const { data: claims } = await sb.from('player_claims').select('user_id,gd_name').eq('status','approved').in('user_id', userIds);
                const { data: profiles } = await sb.from('profiles').select('id,username').in('id', userIds);
                (claims || []).forEach(c => { nameMap[c.user_id] = c.gd_name; });
                (profiles || []).forEach(p => { if (!nameMap[p.id]) nameMap[p.id] = p.username; });
            }

            const recordsHTML = records && records.length > 0
                ? `<div class="section-title">🏆 Approved Records (${records.length})</div>
                   <div class="records-card">
                       <table class="records-table">
                           <thead><tr><th>#</th><th>Player</th><th>Video</th></tr></thead>
                           <tbody>
                               ${records.map((r, i) => `
                                   <tr>
                                       <td style="color:#555">${i + 1}</td>
                                       <td class="player-name">${nameMap[r.user_id] || r.user_id.slice(0,8)+'...'}</td>
                                       <td>${r.video_url ? `<a href="${r.video_url}" target="_blank">▶ Watch</a>` : '—'}</td>
                                   </tr>`).join('')}
                           </tbody>
                       </table>
                   </div>`
                : `<div class="section-title">🏆 Approved Records</div>
                   <div class="records-card" style="padding:32px;text-align:center;color:#555;">No approved records yet. Be the first!</div>`;

            container.innerHTML = `
                <a class="btn-back" href="${isMain ? 'index.html' : 'bebotian.html'}">← Back to ${isMain ? 'Demon List' : 'Bebotian List'}</a>

                <div class="hero" style="margin-top:16px;">
                    <img src="${thumb}" alt="${level.name}" onerror="this.src='https://via.placeholder.com/860x320/1a1a1a/333?text=No+Thumbnail'">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <div class="hero-rank">#${level.rank} on the ${isMain ? 'Demon List' : 'Bebotian Demon List'}</div>
                        <h1 class="hero-name">${level.name}</h1>
                        <p class="hero-creator">by ${level.creator || 'Unknown'}</p>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-card">
                        <div class="label">🎵 Song</div>
                        <div class="value">${level.Song || 'Unknown'}</div>
                    </div>
                    <div class="info-card">
                        <div class="label">✅ Verified by</div>
                        <div class="value">${level.Verifier || 'Unknown'}</div>
                    </div>
                    <div class="info-card">
                        <div class="label">🏗️ Creator</div>
                        <div class="value">${level.creator || 'Unknown'}</div>
                    </div>
                    <div class="info-card">
                        <div class="label">📊 List Rank</div>
                        <div class="value" style="color:#00ff73;font-weight:bold;font-size:1.3rem">#${level.rank}</div>
                    </div>
                </div>

                <div class="action-row">
                    ${level.video_url ? `<a class="btn-watch" href="${level.video_url}" target="_blank">▶ Watch Verification</a>` : ''}
                    <a class="btn-submit" href="../submit.html">+ Submit a Record</a>
                </div>

                ${recordsHTML}`;
        }

        initAuth();
        loadLevel();
    </script>
</body>
</html>
